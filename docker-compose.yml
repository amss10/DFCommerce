version: '3.8'

services:
  dfcommerce:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./test.db
      - SECRET_KEY=docker-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - ./test.db:/app/test.db
    command: >
      sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"
