<!-- Cart Section -->
<section id="cart-section" class="content-section">
    <div class="section-header">
        <h2>🛒 Shopping Cart</h2>
    </div>
    <div class="cart-container">
        <div id="cart-items-list" class="cart-items-list">
            <div class="empty-state">Your cart is empty</div>
        </div>
        <div class="cart-summary">
            <div class="cart-total-box">
                <div class="cart-total">
                    <span>Subtotal:</span>
                    <strong id="cart-subtotal">$0.00</strong>
                </div>
                <div class="cart-total" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee;">
                    <span>Total:</span>
                    <strong id="cart-total" style="font-size: 1.3rem;">$0.00</strong>
                </div>
            </div>
            <button id="checkout-button" class="primary-button full-width" type="button" disabled style="margin-top: 20px;">Proceed to Checkout</button>
            <button id="clear-cart-button" class="ghost-button full-width" type="button">Clear Cart</button>
        </div>
    </div>
</section>
